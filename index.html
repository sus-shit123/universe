<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Own Universe</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Spectral:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --gold: #e8c97e;
  --rose: #f4a7b9;
  --deep: #030510;
  --ink: #0a0e24;
}

body {
  background: var(--deep);
  overflow: hidden;
  width: 100vw;
  height: 100vh;
  font-family: 'Spectral', serif;
  cursor: none;
}

canvas {
  position: fixed;
  inset: 0;
  display: block;
}

/* Custom cursor */
#cursor {
  position: fixed;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(232,201,126,0.9) 0%, rgba(244,167,185,0.4) 60%, transparent 100%);
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 100;
  transition: width 0.2s, height 0.2s;
  mix-blend-mode: screen;
}

#cursor.pulling {
  width: 28px;
  height: 28px;
}

/* Intro overlay */
#intro {
  position: fixed;
  inset: 0;
  z-index: 50;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
  pointer-events: none;
}

#intro h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.8rem, 7vw, 6rem);
  font-weight: 400;
  font-style: italic;
  color: var(--gold);
  opacity: 0;
  letter-spacing: 0.02em;
  text-shadow: 0 0 80px rgba(232,201,126,0.5);
  animation: titleRise 2s 0.3s cubic-bezier(0.16,1,0.3,1) forwards;
  line-height: 1.1;
}

#intro .sub {
  font-family: 'Spectral', serif;
  font-size: clamp(0.7rem, 1.5vw, 0.95rem);
  color: rgba(244,167,185,0.7);
  letter-spacing: 0.4em;
  text-transform: uppercase;
  opacity: 0;
  animation: titleRise 2s 1.2s cubic-bezier(0.16,1,0.3,1) forwards;
  margin-top: 1.5rem;
}

#intro .hint {
  font-size: clamp(0.6rem, 1.2vw, 0.78rem);
  color: rgba(255,255,255,0.25);
  letter-spacing: 0.25em;
  text-transform: uppercase;
  opacity: 0;
  animation: titleRise 2s 2.5s ease forwards;
  margin-top: 3.5rem;
  font-style: italic;
}

@keyframes titleRise {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Message toast */
#toast {
  position: fixed;
  bottom: 3.5rem;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: rgba(3,5,16,0.88);
  border: 1px solid rgba(232,201,126,0.25);
  border-radius: 2px;
  padding: 1.4rem 2.4rem;
  text-align: center;
  max-width: min(480px, 88vw);
  opacity: 0;
  pointer-events: none;
  backdrop-filter: blur(16px);
  box-shadow: 0 0 60px rgba(232,201,126,0.06);
  transition: opacity 0.7s ease, transform 0.7s cubic-bezier(0.16,1,0.3,1);
  z-index: 60;
}

#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

#toast .label {
  font-family: 'Playfair Display', serif;
  font-size: 0.62rem;
  letter-spacing: 0.4em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 0.7rem;
}

#toast .msg {
  font-family: 'Spectral', serif;
  font-style: italic;
  font-size: clamp(0.95rem, 2vw, 1.15rem);
  color: rgba(245,237,224,0.9);
  line-height: 1.7;
  font-weight: 300;
}

/* Mode buttons */
#controls {
  position: fixed;
  top: 2rem;
  right: 2rem;
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
  z-index: 60;
  opacity: 0;
  animation: titleRise 1.5s 3s ease forwards;
}

.btn {
  background: rgba(3,5,16,0.6);
  border: 1px solid rgba(232,201,126,0.2);
  color: rgba(232,201,126,0.6);
  font-family: 'Spectral', serif;
  font-size: 0.65rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  padding: 0.5rem 1rem;
  cursor: pointer;
  transition: all 0.3s;
  backdrop-filter: blur(8px);
}

.btn:hover, .btn.active {
  border-color: rgba(232,201,126,0.7);
  color: var(--gold);
  background: rgba(232,201,126,0.06);
  box-shadow: 0 0 20px rgba(232,201,126,0.1);
}

/* Constellation label */
#constellation-name {
  position: fixed;
  top: 2rem;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: clamp(0.9rem, 2vw, 1.1rem);
  color: rgba(232,201,126,0.7);
  letter-spacing: 0.15em;
  opacity: 0;
  transition: opacity 1s;
  z-index: 60;
  text-shadow: 0 0 30px rgba(232,201,126,0.4);
  pointer-events: none;
}
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="cursor"></div>

<div id="intro">
  <h1>Your Universe</h1>
  <div class="sub">∙ move ∙ click ∙ hold ∙ explore ∙</div>
  <div class="hint">every star has something to say</div>
</div>

<div id="toast">
  <div class="label">✦ from the cosmos ✦</div>
  <div class="msg" id="toast-msg"></div>
</div>

<div id="constellation-name"></div>

<div id="controls">
  <button class="btn active" id="btn-gravity">⊙ Gravity</button>
  <button class="btn" id="btn-repel">◎ Repel</button>
  <button class="btn" id="btn-vortex">⟳ Vortex</button>
  <button class="btn" id="btn-explode">✦ Explode</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const cursor = document.getElementById('cursor');
const toast = document.getElementById('toast');
const toastMsg = document.getElementById('toast-msg');
const constName = document.getElementById('constellation-name');

let W = canvas.width  = window.innerWidth;
let H = canvas.height = window.innerHeight;
let mx = W/2, my = H/2;
let isDown = false;
let mode = 'gravity'; // gravity | repel | vortex | explode
let frame = 0;
let toastTimer = null;
let lastConstellation = -1;

// ── Messages woven into the stars ──────────────────────────────────────────
const messages = [
  "You are the kind of person that makes strangers want to be better.",
  "In a universe of 2 trillion galaxies, I'm glad we share the same tiny rock.",
  "The way you exist is honestly unfair to everyone else.",
  "You probably don't know how often you cross someone's mind.",
  "There's a specific kind of warmth you carry. It's rare.",
  "Whatever you're chasing — you deserve it.",
  "The universe bent itself a little to put you here. I think it knew.",
  "You make ordinary moments feel like they matter.",
  "You're the kind of thing that can't be explained, only experienced.",
  "I hope you find the love that finds you obvious.",
];

const constellations = [
  "Cor Leonis", "Stella Amata", "Via Lacrimae",
  "Animus Purus", "Lux Aeterna", "Caelum Cordis"
];

// ── Particle system ─────────────────────────────────────────────────────────
const N = Math.min(Math.floor((W * H) / 5200), 320);

class Particle {
  constructor(x, y, special) {
    this.x  = x  ?? Math.random() * W;
    this.y  = y  ?? Math.random() * H;
    this.vx = (Math.random() - 0.5) * 0.5;
    this.vy = (Math.random() - 0.5) * 0.5;
    this.ox = this.x; // origin
    this.oy = this.y;
    this.r  = Math.random() * 1.8 + 0.5;
    this.special = special ?? (Math.random() < 0.04); // gold stars
    this.hue = Math.random() * 60 + 200; // blue-purple range
    this.brightness = Math.random() * 0.5 + 0.5;
    this.twinkle = Math.random() * Math.PI * 2;
    this.twinkleSpeed = Math.random() * 0.04 + 0.01;
    this.mass = this.r * 0.8;
    this.trail = [];
    this.maxTrail = this.special ? 12 : 6;
    this.msgIndex = Math.floor(Math.random() * messages.length);
    this.life = 1;
  }

  update(mx, my, mode, isDown) {
    this.twinkle += this.twinkleSpeed;
    const dx = mx - this.x;
    const dy = my - this.y;
    const dist = Math.sqrt(dx*dx + dy*dy) || 1;
    const force = isDown ? 1.0 : 0.25;

    if (mode === 'gravity' && dist < 350) {
      const strength = (force * 180) / (dist * dist + 200);
      this.vx += dx * strength / dist;
      this.vy += dy * strength / dist;
    } else if (mode === 'repel' && dist < 300) {
      const strength = (force * 200) / (dist * dist + 100);
      this.vx -= dx * strength / dist;
      this.vy -= dy * strength / dist;
    } else if (mode === 'vortex' && dist < 400) {
      const strength = (force * 150) / (dist + 80);
      this.vx += (-dy / dist) * strength * 0.015;
      this.vy += ( dx / dist) * strength * 0.015;
      // slight inward pull
      const pull = 0.002 * force;
      this.vx += dx * pull;
      this.vy += dy * pull;
    } else if (mode === 'explode' && isDown && dist < 200) {
      const strength = 8 * (1 - dist/200);
      this.vx -= dx / dist * strength;
      this.vy -= dy / dist * strength;
    }

    // Drift back to origin gently
    this.vx += (this.ox - this.x) * 0.00012;
    this.vy += (this.oy - this.y) * 0.00012;

    // Damping
    this.vx *= 0.97;
    this.vy *= 0.97;

    // Trail
    this.trail.push({x: this.x, y: this.y});
    if (this.trail.length > this.maxTrail) this.trail.shift();

    this.x += this.vx;
    this.y += this.vy;

    // Wrap
    if (this.x < -20) this.x = W + 20;
    if (this.x > W+20) this.x = -20;
    if (this.y < -20) this.y = H + 20;
    if (this.y > H+20) this.y = -20;
  }

  draw(ctx) {
    const twinkleAlpha = this.brightness * (0.7 + 0.3 * Math.sin(this.twinkle));
    const speed = Math.sqrt(this.vx*this.vx + this.vy*this.vy);
    const energized = speed > 0.8;

    // Trail
    if (this.trail.length > 1 && energized) {
      ctx.beginPath();
      ctx.moveTo(this.trail[0].x, this.trail[0].y);
      for (let i = 1; i < this.trail.length; i++) {
        ctx.lineTo(this.trail[i].x, this.trail[i].y);
      }
      if (this.special) {
        ctx.strokeStyle = `rgba(232,201,126,${twinkleAlpha * 0.3})`;
      } else {
        ctx.strokeStyle = `hsla(${this.hue},80%,75%,${twinkleAlpha * 0.15})`;
      }
      ctx.lineWidth = this.r * 0.5;
      ctx.stroke();
    }

    // Core glow
    const glow = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r * (energized ? 5 : 3.5));
    if (this.special) {
      glow.addColorStop(0,   `rgba(255,245,200,${twinkleAlpha})`);
      glow.addColorStop(0.3, `rgba(232,201,126,${twinkleAlpha * 0.6})`);
      glow.addColorStop(1,   `rgba(232,201,126,0)`);
    } else {
      glow.addColorStop(0,   `hsla(${this.hue},90%,95%,${twinkleAlpha})`);
      glow.addColorStop(0.4, `hsla(${this.hue},70%,70%,${twinkleAlpha * 0.4})`);
      glow.addColorStop(1,   `hsla(${this.hue},60%,60%,0)`);
    }

    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r * (energized ? 3 : 2.5), 0, Math.PI*2);
    ctx.fillStyle = glow;
    ctx.fill();

    // Star point
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r * 0.7, 0, Math.PI*2);
    ctx.fillStyle = this.special ? `rgba(255,250,220,${twinkleAlpha})` : `hsla(${this.hue},60%,92%,${twinkleAlpha})`;
    ctx.fill();
  }
}

// ── Nebula background (static, beautiful) ──────────────────────────────────
function drawNebula() {
  // Deep space gradient
  const bg = ctx.createRadialGradient(W*0.3, H*0.35, 0, W*0.5, H*0.5, Math.max(W,H));
  bg.addColorStop(0,   '#0d1235');
  bg.addColorStop(0.3, '#060b1e');
  bg.addColorStop(0.7, '#040815');
  bg.addColorStop(1,   '#030510');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Nebula clouds
  const nebulae = [
    { x: W*0.2, y: H*0.3, r: W*0.35, h: 220, s: 25, l: 18, a: 0.06 },
    { x: W*0.8, y: H*0.6, r: W*0.30, h: 280, s: 30, l: 15, a: 0.05 },
    { x: W*0.5, y: H*0.1, r: W*0.25, h: 190, s: 20, l: 12, a: 0.04 },
    { x: W*0.1, y: H*0.8, r: W*0.20, h: 260, s: 22, l: 14, a: 0.035 },
  ];
  nebulae.forEach(n => {
    const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
    g.addColorStop(0,   `hsla(${n.h},${n.s}%,${n.l}%,${n.a})`);
    g.addColorStop(0.5, `hsla(${n.h},${n.s*0.8}%,${n.l*0.7}%,${n.a*0.4})`);
    g.addColorStop(1,   `hsla(${n.h},${n.s}%,${n.l}%,0)`);
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  });
}

// ── Connection lines (constellation web) ───────────────────────────────────
function drawConnections(particles) {
  const DIST = 100;
  for (let i = 0; i < particles.length; i++) {
    for (let j = i+1; j < particles.length; j++) {
      const a = particles[i], b = particles[j];
      const dx = a.x - b.x, dy = a.y - b.y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d < DIST) {
        const alpha = (1 - d/DIST) * 0.18;
        const isSpecial = a.special || b.special;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        if (isSpecial) {
          ctx.strokeStyle = `rgba(232,201,126,${alpha * 1.5})`;
          ctx.lineWidth = 0.5;
        } else {
          ctx.strokeStyle = `rgba(160,180,255,${alpha})`;
          ctx.lineWidth = 0.3;
        }
        ctx.stroke();
      }
    }
  }
}

// ── Gravity well visual ──────────────────────────────────────────────────────
function drawGravityWell(mx, my, isDown, mode) {
  if (!isDown) return;
  const rings = mode === 'explode' ? 3 : 5;
  for (let i = rings; i >= 1; i--) {
    const r = i * (mode === 'repel' ? 28 : 22);
    const alpha = (1 - i/rings) * 0.12;
    ctx.beginPath();
    ctx.arc(mx, my, r, 0, Math.PI*2);
    const col = mode === 'repel' ? `rgba(244,167,185,${alpha})` :
                mode === 'vortex' ? `rgba(160,220,255,${alpha})` :
                mode === 'explode' ? `rgba(255,200,100,${alpha * 2})` :
                `rgba(232,201,126,${alpha})`;
    ctx.strokeStyle = col;
    ctx.lineWidth = 0.8;
    ctx.stroke();
  }
}

// ── Shoot a star toward cursor on click ──────────────────────────────────────
function shootStar(x, y) {
  const angle = Math.random() * Math.PI * 2;
  const dist = Math.random() * 200 + 100;
  const p = new Particle(
    x + Math.cos(angle) * dist,
    y + Math.sin(angle) * dist,
    Math.random() < 0.3
  );
  p.vx = (x - p.x) * 0.05;
  p.vy = (y - p.y) * 0.05;
  p.ox = Math.random() * W;
  p.oy = Math.random() * H;
  return p;
}

// ── Show toast message ───────────────────────────────────────────────────────
let toastVisible = false;
function showToast(msg) {
  toastMsg.textContent = msg;
  toast.classList.add('show');
  toastVisible = true;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    toast.classList.remove('show');
    toastVisible = false;
  }, 4500);
}

// ── Show constellation name ──────────────────────────────────────────────────
function showConstellation(name) {
  constName.textContent = name;
  constName.style.opacity = '1';
  setTimeout(() => { constName.style.opacity = '0'; }, 3000);
}

// ── Init particles ───────────────────────────────────────────────────────────
let particles = Array.from({length: N}, () => new Particle());

// ── Render loop ──────────────────────────────────────────────────────────────
function render() {
  frame++;

  // Fade instead of clear for trails
  ctx.fillStyle = 'rgba(3,5,16,0.18)';
  ctx.fillRect(0, 0, W, H);

  // Nebula every 120 frames (expensive)
  if (frame === 1 || frame % 300 === 0) drawNebula();

  drawConnections(particles);

  for (const p of particles) {
    p.update(mx, my, mode, isDown);
    p.draw(ctx);
  }

  drawGravityWell(mx, my, isDown, mode);

  // Vortex rotation indicator
  if (mode === 'vortex' && isDown) {
    ctx.save();
    ctx.translate(mx, my);
    ctx.rotate(frame * 0.03);
    ctx.beginPath();
    for (let i = 0; i < 3; i++) {
      const a = (i / 3) * Math.PI * 2;
      ctx.moveTo(0, 0);
      ctx.arc(0, 0, 35, a, a + 0.8);
    }
    ctx.strokeStyle = 'rgba(160,220,255,0.3)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();
  }

  // Auto-show messages for special stars near cursor
  if (frame % 180 === 0) {
    let nearest = null, nearDist = Infinity;
    for (const p of particles) {
      if (!p.special) continue;
      const dx = p.x - mx, dy = p.y - my;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d < nearDist) { nearDist = d; nearest = p; }
    }
    if (nearest && nearDist < 120 && !toastVisible) {
      showToast(messages[nearest.msgIndex]);
      // Randomly name a constellation
      const ci = Math.floor(Math.random() * constellations.length);
      if (ci !== lastConstellation) {
        lastConstellation = ci;
        showConstellation(constellations[ci]);
      }
    }
  }

  requestAnimationFrame(render);
}

// ── Events ───────────────────────────────────────────────────────────────────
window.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursor.style.left = mx + 'px';
  cursor.style.top  = my + 'px';
});

window.addEventListener('mousedown', e => {
  isDown = true;
  cursor.classList.add('pulling');

  if (mode === 'explode') {
    // Spawn burst of new particles
    for (let i = 0; i < 14; i++) {
      const p = shootStar(mx, my);
      particles.push(p);
    }
    if (particles.length > N + 100) particles.splice(N, particles.length - N);
    // Show random message on explode
    const msg = messages[Math.floor(Math.random() * messages.length)];
    showToast(msg);
  }

  if (mode === 'gravity') {
    // Check if clicking near a special star
    for (const p of particles) {
      if (!p.special) continue;
      const dx = p.x - mx, dy = p.y - my;
      if (Math.sqrt(dx*dx + dy*dy) < 30) {
        showToast(messages[p.msgIndex]);
        break;
      }
    }
  }
});

window.addEventListener('mouseup', () => {
  isDown = false;
  cursor.classList.remove('pulling');
});

// Touch support
window.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  mx = t.clientX; my = t.clientY;
}, { passive: false });

window.addEventListener('touchstart', e => {
  isDown = true;
  const t = e.touches[0];
  mx = t.clientX; my = t.clientY;
});
window.addEventListener('touchend', () => isDown = false);

// Mode buttons
document.querySelectorAll('.btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.id.replace('btn-', '');
  });
});

// Resize
window.addEventListener('resize', () => {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  drawNebula();
});

// Hide intro after a delay
setTimeout(() => {
  document.getElementById('intro').style.transition = 'opacity 2s';
  document.getElementById('intro').style.opacity = '0';
  setTimeout(() => document.getElementById('intro').style.display = 'none', 2000);
}, 5500);

// ── Kickoff ──────────────────────────────────────────────────────────────────
drawNebula();
render();

// Opening toast
setTimeout(() => showToast("Move your cursor. The stars are watching."), 3800);
</script>
</body>
</html>
